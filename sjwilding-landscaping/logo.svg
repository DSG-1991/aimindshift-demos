<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <!-- Background circle for the icon -->
  <circle cx="40" cy="40" r="35" fill="#2d5016" opacity="0.1"/>
  
  <!-- Tree icon -->
  <g transform="translate(40, 40)">
    <!-- Trunk -->
    <rect x="-4" y="8" width="8" height="18" fill="#6b4423" rx="2"/>
    
    <!-- Leaves - three organic shapes -->
    <ellipse cx="0" cy="-5" rx="18" ry="15" fill="#4a7c2c" transform="rotate(-20 0 -5)"/>
    <ellipse cx="-8" cy="0" rx="16" ry="13" fill="#5d9c3a" transform="rotate(15 -8 0)"/>
    <ellipse cx="8" cy="2" rx="15" ry="12" fill="#3d6b28" transform="rotate(-30 8 2)"/>
    
    <!-- Highlight on main leaf -->
    <ellipse cx="-3" cy="-8" rx="6" ry="5" fill="#7cb84d" opacity="0.6"/>
  </g>
  
  <!-- Company name -->
  <text x="85" y="35" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#2d5016">
    S J Wilding
  </text>
  <text x="85" y="55" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#5d9c3a" letter-spacing="1">
    LANDSCAPING
  </text>
</svg>
