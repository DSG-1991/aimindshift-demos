<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightWave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle with gradient -->
  <circle cx="100" cy="100" r="95" fill="url(#waterGradient)" opacity="0.1"/>
  
  <!-- Wave pattern background -->
  <path d="M 30,100 Q 45,85 60,100 T 90,100 T 120,100 T 150,100 T 170,100" 
        stroke="url(#lightWave)" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 30,110 Q 45,95 60,110 T 90,110 T 120,110 T 150,110 T 170,110" 
        stroke="url(#lightWave)" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 30,120 Q 45,105 60,120 T 90,120 T 120,120 T 150,120 T 170,120" 
        stroke="url(#lightWave)" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Main water droplet shape -->
  <path d="M 100,40 C 85,55 70,70 70,90 C 70,110 83,125 100,125 C 117,125 130,110 130,90 C 130,70 115,55 100,40 Z" 
        fill="url(#waterGradient)" filter="url(#glow)"/>
  
  <!-- Inner highlight on droplet -->
  <ellipse cx="95" cy="80" rx="12" ry="18" fill="white" opacity="0.4"/>
  <ellipse cx="92" cy="75" rx="6" ry="9" fill="white" opacity="0.6"/>
  
  <!-- Flowing wave inside droplet -->
  <path d="M 80,90 Q 90,85 100,90 T 120,90" 
        stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Wrench integrated into design -->
  <g transform="translate(100, 140)">
    <rect x="-3" y="0" width="6" height="30" fill="url(#waterGradient)" rx="3"/>
    <circle cx="0" cy="35" r="8" fill="none" stroke="url(#waterGradient)" stroke-width="4"/>
  </g>
  
  <!-- Ripple circles at bottom -->
  <circle cx="100" cy="170" r="15" fill="none" stroke="url(#waterGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="170" r="22" fill="none" stroke="url(#waterGradient)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="100" cy="170" r="29" fill="none" stroke="url(#waterGradient)" stroke-width="1" opacity="0.1"/>
  
  <!-- Text elements -->
  <text x="100" y="192" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="700" 
        fill="url(#waterGradient)" text-anchor="middle">BLUE MOTION</text>
</svg>
