<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P. Wood Plastering | Professional Plastering Services in Preston</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Reliable Professional Design Language */
        :root {
            --primary-blue: #0d6efd;
            --secondary-gray: #6c757d;
            --light-gray: #f8f9fa;
            --white: #ffffff;
            --dark-text: #343a40;
            --border-radius: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --sans-serif: 'Poppins', sans-serif;
        }
        
        body {
            font-family: var(--sans-serif);
            color: var(--dark-text);
            margin: 0;
            background-color: var(--white);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* All other styles will go here */
        .header-container {
            background-color: var(--white);
            padding: 1rem;
            border-bottom: 1px solid #e9ecef;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-img { height: 50px; }
        .phone-btn {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius);
            text-decoration: none;
            font-weight: 600;
        }
        .hero {
            background: var(--light-gray);
            padding: 4rem 1rem;
        }
        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
        }
        .hero-text h1 { font-size: 3rem; margin-bottom: 1rem; color: var(--primary-blue);}
        .hero-text p { font-size: 1.2rem; line-height: 1.6; }
        .hero-image { background: url('hero-video.mp4') center/cover; height: 400px; border-radius: var(--border-radius); }
        .trust-badges { display: flex; gap: 1rem; margin-top: 2rem; }
        .badge { background: var(--white); padding: 0.5rem 1rem; border-radius: var(--border-radius); box-shadow: var(--shadow); font-weight: 600; }
        .work-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .before, .after { position: relative; }
        .before::before, .after::before { content: 'BEFORE'; position: absolute; top: 10px; left: 10px; background: red; color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 700; }
        .after::before { content: 'AFTER'; background: green; }

@media (max-width: 768px) {
    .hero-content { grid-template-columns: 1fr; }
    .postcode-input { flex-direction: column; width: 100%; }
    .postcode-input input, .check-button { width: 100%; }
    .work-comparison { grid-template-columns: 1fr; }
}
    </style>
</head>
<body>
    <header class="header-container"></header>
    <main>
        <!-- Sections will be added here -->
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <div class="hero-text">
                        <h1>Perfect Plastering in Preston.</h1>
                        <p>Flawless finishes, reliable service, and a commitment to quality. See how P. Wood Plastering can transform your space.</p>
                        <div class="trust-badges">
                            <div class="badge">✔️ 15+ Years Experience</div>
                            <div class="badge">✔️ Fully Insured</div>
                            <div class="badge">✔️ 5-Star Rated</div>
                        </div>
                    </div>
                    <div class="hero-image"></div>
                </div>
            </div>
        </section>

        <section class="container" style="padding: 4rem 1rem;">
          <!-- Other sections will go here -->
          <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 2rem;">Our Services</h2>
          <!-- Services grid will go here -->

          <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 2rem; margin-top: 4rem;">Our Work</h2>
           <!-- Portfolio gallery will go here -->

          <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 2rem; margin-top: 4rem;">What Our Customers Say</h2>
           <!-- Testimonials will go here -->

          <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 2rem; margin-top: 4rem;">See the Difference</h2>
            <div class="work-comparison">
                <div class="before"><img src="https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?w=500" style="width:100%; border-radius: 8px;" /></div>
                <div class="after"><img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952?w=500" style="width:100%; border-radius: 8px;"/></div>
            </div>
        </section>
    </main>
    <footer class="footer-container"></footer>
    <script>
        // JS will go here
    </script>
</body>
</html>
