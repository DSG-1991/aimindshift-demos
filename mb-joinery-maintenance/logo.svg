<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" font-family="Roboto, sans-serif" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="woodGrain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b58a69;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8e7059;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5442;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shape for the logo, subtle dark blue/gray -->
  <rect x="0" y="0" width="200" height="60" fill="#2c3e50" rx="8" filter="url(#shadow)"/>

  <!-- Stylized M letter (from MB) as a woodworking joint -->
  <path d="M20 20 L30 20 L30 40 L20 40 L20 30 L40 30 L40 20 L50 20 L50 40 L40 40 L40 30 L20 30 Z" fill="url(#woodGrain)" filter="url(#shadow)"/>

  <!-- Text: MB Joinery -->
  <text x="60" y="30" fill="#ecf0f1" font-size="20" font-weight="bold" dominant-baseline="middle" text-anchor="start" filter="url(#shadow)">
    MB Joinery
  </text>
  <!-- Text: & Maintenance -->
  <text x="60" y="45" fill="#bdc3c7" font-size="12" dominant-baseline="middle" text-anchor="start">
    & Maintenance
  </text>
</svg>